# === Standards & Open Infrastructure ===

- category: standards
  title: "data.europeana.eu: Europeana Linked Open Data"
  date: 2013-06-01
  partners:
    - Europeana Foundation
  description: >
    Co-developed the Europeana Linked Open Data pilot, which published
    metadata for 20 million cultural-heritage objects from European
    institutions as Linked Open Data. The pilot set the model that libraries,
    museums, and archives now follow when sharing their collections on the
    web.
  evidence_uri: "https://data.europeana.eu"
  evidence_label: "data.europeana.eu"
  icon: fa-book-open-reader

- category: standards
  title: "ResourceSync Framework Specification"
  date: 2014-04-30
  partners:
    - NISO
    - Open Archives Initiative
  description: >
    Co-edited the ResourceSync framework, a NISO/OAI standard that lets
    third-party systems remain synchronised with a server's evolving web
    resources. Funded by the Alfred P. Sloan Foundation.
  evidence_uri: "https://www.openarchives.org/rs/resourcesync"
  evidence_label: "Specification"
  icon: fa-file-contract

- category: standards
  title: "W3C Open Annotation Data Model"
  date: 2017-02-23
  partners:
    - W3C
  description: >
    Contributed to the W3C standard for interoperable web annotations, used
    by digital library, scholarly publishing, and digital humanities
    communities.
  evidence_uri: "https://www.w3.org/TR/annotation-model/"
  evidence_label: "W3C Recommendation"
  icon: fa-file-contract

- category: standards
  title: "Towards harmonised blockchain intelligence standards"
  date: 2025-10-08
  partners:
    - Basel Institute on Governance
  description: >
    Organised a breakout session at the 9th Global Conference on Criminal
