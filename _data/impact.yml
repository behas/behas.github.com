# === Societal Impact ===

- category: societal-impact
  title: "Takedown of over 370,000 illegal dark web sites"
  date: 2026-03-24
  partners:
    - Bavarian Central Office for the Prosecution of Cybercrime
  description: >
    Methods developed jointly with the Bavarian Central Office for the
    Prosecution of Cybercrime supported a coordinated international
    operation. It disrupted criminal infrastructure responsible for over
    370,000 illegal dark web sites.
  evidence_uri: "https://www.europol.europa.eu/media-press/newsroom/news/global-cybercrime-crackdown-over-373-000-dark-web-sites-shut-down"
  evidence_label: "Press release"
  icon: fa-shield-halved

- category: societal-impact
  title: "Connecting cases with the Bavarian Cybercrime Prosecution Office"
  date: 2023-11-16
  partners:
    - Bavarian Central Office for the Prosecution of Cybercrime
  description: >
    Joint method development that links related cryptoasset investigations
    across cases, reducing investigative effort and shortening
    time-to-resolution for victims of fraud and extortion.
  evidence_uri: "https://arxiv.org/abs/2311.08205"
  evidence_label: "Paper"
  icon: fa-link

- category: societal-impact
