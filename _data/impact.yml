# === Societal Impact ===

- category: societal-impact
  title: "Supported takedown of over 370,000 illegal dark web sites"
  date: 2026-03-24
  partners:
    - Bavarian Central Office for the Prosecution of Cybercrime
  description: >
    Methods developed jointly with the Bavarian Central Office for the
    Prosecution of Cybercrime supported a coordinated international
    operation. It disrupted criminal infrastructure responsible for over
    370,000 illegal dark web sites.
  evidence_uri: "https://www.europol.europa.eu/media-press/newsroom/news/global-cybercrime-crackdown-over-373-000-dark-web-sites-shut-down"
  evidence_label: "Press release"
  icon: fa-shield-halved

- category: societal-impact
  title: "Connecting cases with the Bavarian Cybercrime Prosecution Office"
  date: 2023-11-16
  partners:
    - Bavarian Central Office for the Prosecution of Cybercrime
  description: >
    Joint method development that links related cryptoasset investigations
    across cases, reducing investigative effort and shortening
    time-to-resolution for victims of fraud and extortion.
  evidence_uri: "https://arxiv.org/abs/2311.08205"
  evidence_label: "Paper"
  icon: fa-link

- category: societal-impact
  title: "INTERPOL New Technologies Forum"
  date: 2025-09-03
  partners:
    - INTERPOL
  description: >
    Serving as academic partner for INTERPOL's New Technologies Forum in
    2025 and again in 2026, bringing investigators and researchers together
    to align on evidence-based responses to emerging digital threats.
  evidence_uri: "https://csh.ac.at/news/csh-hosts-interpol-new-technology-forum-2025/"
  evidence_label: "Event page"
  icon: fa-globe

# === Industry & Adoption ===

- category: industry
  title: "Iknaio Cryptoasset Analytics: research-to-commercial spin-off"
  date: 2023-01-30
  description: >
    Spin-off translating GraphSense research into production infrastructure
    used by financial institutions, regulators, and investigators across
    Europe and beyond.
  evidence_uri: "https://www.iknaio.com/"
  evidence_label: "Iknaio"
  icon: fa-building

- category: industry
  title: "GraphSense: open-source cryptoasset analytics platform"
  date: 2024-01-23
  description: >
    Continuously released open-source platform used by researchers,
    investigators, and industry. Recent releases added Tron support and
    tracing across DEXs, bridges, and cross-chain address clusters.
  evidence_uri: "https://graphsense.org/"
  evidence_label: "GraphSense"
  icon: fa-code-branch

# === Policy & Regulation ===

- category: policy
  title: "Evidence for central banks and financial supervisors"
  date: 2025-05-24
  description: >
    Research that informs central bank and supervisory thinking on the
    architecture, risks, and measurability of decentralized finance.
    Examples include BIS working papers on the technology of decentralized
    finance and on the verifiability of Total Value Locked in DeFi, produced
    with the BIS Innovation Hub.
  evidence_uri: "https://www.bis.org/publ/work1268.htm"
  evidence_label: "Example: BIS working paper"
  icon: fa-landmark

- category: policy
  title: "Engagement in European policy debate"
  date: 2025-08-20
  description: >
    Recurring engagement with European policy and business audiences on the
    implications of digital assets, cybercrime, and decentralized finance.
    Examples include serving on the scientific committee of the European
    Forum Alpbach and organising its seminars on these topics from 2023 to
    2025.
  evidence_uri: "https://www.alpbach.org/sessions/unveiling-modern-crime-tackling-cybercrime-in-a-globalised-world"
  evidence_label: "Example: Alpbach seminar"
  icon: fa-globe

# === Standards & Open Infrastructure ===

- category: standards
  title: "data.europeana.eu: Europeana Linked Open Data"
  date: 2013-06-01
  partners:
    - Europeana Foundation
  description: >
    Co-developed the Europeana Linked Open Data pilot, which published
    metadata for 20 million cultural-heritage objects from European
    institutions as Linked Open Data. The pilot set the model that libraries,
    museums, and archives now follow when sharing their collections on the
    web.
  evidence_uri: "https://data.europeana.eu"
  evidence_label: "data.europeana.eu"
  icon: fa-book-open-reader

- category: standards
  title: "ResourceSync Framework Specification"
  date: 2014-04-30
  partners:
    - NISO
    - Open Archives Initiative
  description: >
    Co-edited the ResourceSync framework, a NISO/OAI standard that lets
    third-party systems remain synchronised with a server's evolving web
    resources. Funded by the Alfred P. Sloan Foundation.
  evidence_uri: "https://www.openarchives.org/rs/resourcesync"
  evidence_label: "Specification"
  icon: fa-file-contract

- category: standards
  title: "W3C Open Annotation Data Model"
  date: 2017-02-23
  partners:
    - W3C
  description: >
    Contributed to the W3C standard for interoperable web annotations, used
    by digital library, scholarly publishing, and digital humanities
    communities.
  evidence_uri: "https://www.w3.org/TR/annotation-model/"
  evidence_label: "W3C Recommendation"
  icon: fa-file-contract

- category: standards
  title: "Open Blockchain Intelligence Standards"
  date: 2025-10-08
  description: >
    Founding editor of the Open Blockchain Intelligence Standards (OBIS)
    initiative, a bottom-up community effort creating open, vendor-neutral
    specifications for shared terminology, attribution, and data exchange
    across investigators, supervisors, and tool providers.
  evidence_uri: "https://obistandards.org/"
  evidence_label: "OBIS"
  icon: fa-stamp
